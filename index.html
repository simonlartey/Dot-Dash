<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Dot-Dash is a fast-paced browser reaction game."
  >
  <title>Dot-Dash</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="game-shell">
    <header class="game-header">
      <p class="eyebrow">Reaction game</p>
      <h1>Dot-Dash</h1>
      <p class="tagline">One dot. One timer. How many clicks can you land?</p>
    </header>

    <section class="game-card" aria-labelledby="play-area-title">
      <div class="hud" aria-label="Game information">
        <p>Score: <strong id="score">0</strong></p>
        <p>Time: <strong id="timer">30</strong>s</p>
      </div>

      <h2 id="play-area-title" class="visually-hidden">Dot-Dash play area</h2>

      <div class="play-area" id="play-area">
        <button
          class="dot"
          id="dot"
          type="button"
          aria-label="Game target"
          disabled
        ></button>
      </div>
    </section>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
